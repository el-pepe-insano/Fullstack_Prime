server.port=8080
spring.application.name=servicio-enrutamiento

spring.cloud.gateway.routes[0].id=servicio-autenticacion
spring.cloud.gateway.routes[0].uri=lb://servicio-autenticacion
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=servicio-catalogo
spring.cloud.gateway.routes[1].uri=lb://servicio-catalogo
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/catalogo/**

spring.cloud.gateway.routes[2].id=servicio-licencias
spring.cloud.gateway.routes[2].uri=lb://servicio-licencias
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/licencias/**

spring.cloud.gateway.routes[3].id=servicio-pedidos
spring.cloud.gateway.routes[3].uri=lb://servicio-pedidos
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/pedidos/**

spring.cloud.gateway.routes[4].id=servicio-pagos
spring.cloud.gateway.routes[4].uri=lb://servicio-pagos
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/pagos/**

spring.cloud.gateway.routes[5].id=servicio-biblioteca
spring.cloud.gateway.routes[5].uri=lb://servicio-biblioteca
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/biblioteca/**

spring.cloud.gateway.routes[6].id=servicio-resenas
spring.cloud.gateway.routes[6].uri=lb://servicio-resenas
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/resenas/**

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=gateway,health
management.endpoint.gateway.enabled=true