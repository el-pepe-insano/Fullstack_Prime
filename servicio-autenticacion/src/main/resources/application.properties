server.port=8081
spring.application.name=servicio-autenticacion

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/nopki_autenticacion?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=nopki-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000