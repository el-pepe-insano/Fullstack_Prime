server.port=8081
spring.application.name=servicio-autenticacion

# Base de datos (apunta al contenedor MySQL)
spring.datasource.url=jdbc:mysql://mysql-db:3306/nopki_autenticacion?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=nopki-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

# Eureka (apunta al contenedor eureka)
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true