server.port=8084
spring.application.name=servicio-pedidos
spring.datasource.url=jdbc:mysql://localhost:3306/nopki_pedidos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# URLs de otros servicios
servicios.autenticacion.url=http://localhost:8081
servicios.catalogo.url=http://localhost:8082
servicios.licencias.url=http://localhost:8083

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true